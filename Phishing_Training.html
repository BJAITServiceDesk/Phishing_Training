<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phishing Awareness Training</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0f1c2e;--navy2:#1a2d45;--navy3:#243d5e;
  --accent:#e8533a;--accent2:#f4a261;
  --teal:#2ec4b6;--teal2:#cbf3f0;
  --text:#f0f4f8;--text2:#a8bdd0;--text3:#6b8aab;
  --card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);
  --success:#2ec45a;--warn:#f4a261;--radius:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
#app{max-width:800px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.progress-wrap{margin-bottom:1rem;}
.progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text3);margin-bottom:6px;}
.progress-bar-wrap{background:rgba(255,255,255,0.08);border-radius:999px;height:5px;}
.progress-bar-fill{height:5px;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--accent2));transition:width 0.5s ease;}
.module-dots{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.module-dot{height:4px;flex:1;border-radius:999px;background:rgba(255,255,255,0.1);transition:background 0.4s;}
.module-dot.done{background:var(--teal);}
.module-dot.active{background:var(--accent2);}
.screen{animation:fadeIn 0.35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
h1.display{font-size:2.4rem;line-height:1.15;font-weight:700;margin-bottom:0.5rem;}
h2.section-title{font-size:1.35rem;font-weight:600;margin-bottom:0.4rem;}
.subtitle{color:var(--text2);font-size:0.97rem;line-height:1.65;margin-bottom:1.6rem;}
.tag{display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;padding:3px 10px;border-radius:999px;margin-bottom:0.9rem;}
.tag.module{background:rgba(46,196,182,0.15);color:var(--teal);border:1px solid rgba(46,196,182,0.3);}
.tag.warn{background:rgba(244,162,97,0.15);color:var(--warn);border:1px solid rgba(244,162,97,0.3);}
.tag.danger{background:rgba(232,83,58,0.15);color:var(--accent);border:1px solid rgba(232,83,58,0.3);}
.tag.success{background:rgba(46,196,90,0.15);color:var(--success);border:1px solid rgba(46,196,90,0.3);}
.tag.info{background:rgba(91,155,213,0.15);color:#5b9bd5;border:1px solid rgba(91,155,213,0.3);}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.3rem 1.5rem;margin-bottom:0.9rem;}
.card.highlight{border-color:rgba(46,196,182,0.3);background:rgba(46,196,182,0.06);}
.card.warn-card{border-color:rgba(244,162,97,0.3);background:rgba(244,162,97,0.06);}
.card.danger-card{border-color:rgba(232,83,58,0.3);background:rgba(232,83,58,0.06);}
.icon-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.icon-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.1rem 0.9rem;text-align:center;}
.icon-card .ico{font-size:1.7rem;margin-bottom:0.4rem;}
.icon-card .ico-label{font-size:0.78rem;color:var(--text2);line-height:1.4;}
.list-check{list-style:none;display:flex;flex-direction:column;gap:0.55rem;margin-bottom:1.1rem;}
.list-check li{display:flex;align-items:flex-start;gap:0.65rem;font-size:0.91rem;color:var(--text2);line-height:1.55;}
.dot{flex-shrink:0;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;margin-top:2px;}
.dot.red{background:rgba(232,83,58,0.2);color:var(--accent);}
.dot.green{background:rgba(46,196,90,0.2);color:var(--success);}
.dot.teal{background:rgba(46,196,182,0.2);color:var(--teal);}
.dot.amber{background:rgba(244,162,97,0.2);color:var(--warn);}
.dot.blue{background:rgba(91,155,213,0.2);color:#5b9bd5;}
.email-mock{background:#151c2b;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);overflow:hidden;margin-bottom:1.1rem;font-size:0.86rem;}
.email-header{padding:0.9rem 1.1rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.email-field{display:flex;gap:0.5rem;margin-bottom:0.25rem;color:var(--text2);}
.email-field strong{color:var(--text3);min-width:52px;}
.email-body{padding:1rem 1.1rem;line-height:1.65;color:var(--text);}
.phish-flag{display:inline-flex;align-items:center;gap:3px;background:rgba(232,83,58,0.18);border:1px solid rgba(232,83,58,0.4);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:0.72rem;font-weight:700;}
.fake-link{color:#5b9bd5;text-decoration:underline;cursor:default;}
.em-btn{display:inline-block;background:#0072c6;color:#fff;padding:7px 16px;border-radius:6px;margin:0.5rem 0;font-size:0.83rem;cursor:default;}
.annotation{display:flex;align-items:flex-start;gap:0.55rem;background:rgba(232,83,58,0.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:0.65rem 0.85rem;margin:0.3rem 0 0.75rem;font-size:0.84rem;color:var(--text2);}
.annotation .ann-icon{flex-shrink:0;color:var(--accent);}
.annotation.good{background:rgba(46,196,90,0.07);border-color:var(--success);}
.annotation.good .ann-icon{color:var(--success);}
.annotation.info{background:rgba(91,155,213,0.07);border-color:#5b9bd5;}
.annotation.info .ann-icon{color:#5b9bd5;}
.step-row{display:flex;gap:0.9rem;margin-bottom:0.9rem;}
.step-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(46,196,182,0.15);border:1px solid rgba(46,196,182,0.3);color:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.83rem;}
.step-text strong{display:block;font-size:0.93rem;color:var(--text);margin-bottom:2px;}
.step-text span{font-size:0.85rem;color:var(--text2);line-height:1.55;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;margin-bottom:1rem;}
@media(max-width:560px){.two-col{grid-template-columns:1fr;}}
.tip-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:1rem 1.1rem;}
.tip-card .tip-icon{font-size:1.3rem;margin-bottom:0.4rem;}
.tip-card strong{display:block;font-size:0.88rem;color:var(--text);margin-bottom:3px;}
.tip-card span{font-size:0.81rem;color:var(--text2);line-height:1.5;}
.url-demo{background:#151c2b;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.8rem 1rem;font-family:monospace;font-size:0.85rem;margin-bottom:0.7rem;word-break:break-all;}
.url-demo .url-bad{color:var(--accent);}
.url-demo .url-good{color:var(--success);}
.url-demo .url-neutral{color:var(--text2);}
.quiz-option{width:100%;text-align:left;background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:0.85rem 1rem;margin-bottom:0.55rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:0.91rem;transition:border-color 0.2s,background 0.2s;}
.quiz-option:hover:not(:disabled){border-color:rgba(46,196,182,0.4);background:rgba(46,196,182,0.06);}
.quiz-option.selected-opt{border-color:rgba(46,196,182,0.5);background:rgba(46,196,182,0.1);}
.quiz-option.correct{border-color:var(--success);background:rgba(46,196,90,0.1);}
.quiz-option.incorrect{border-color:var(--accent);background:rgba(232,83,58,0.1);}
.quiz-option:disabled{cursor:default;}
.quiz-explain{font-size:0.85rem;color:var(--text2);padding:0.65rem 0.85rem;border-radius:8px;margin:0.25rem 0 0.75rem;line-height:1.55;}
.quiz-explain.good{background:rgba(46,196,90,0.08);border-left:3px solid var(--success);}
.quiz-explain.bad{background:rgba(232,83,58,0.08);border-left:3px solid var(--accent);}
.q-counter{font-size:0.8rem;color:var(--text3);margin-bottom:0.4rem;}
.q-text{font-size:1.02rem;font-weight:500;margin-bottom:0.9rem;line-height:1.5;}
.pass-fail-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.78rem;font-weight:700;margin-bottom:1rem;}
.pass-fail-badge.pass{background:rgba(46,196,90,0.15);color:var(--success);border:1px solid rgba(46,196,90,0.3);}
.pass-fail-badge.fail{background:rgba(232,83,58,0.15);color:var(--accent);border:1px solid rgba(232,83,58,0.3);}
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.3rem;font-weight:700;}
.score-circle .sc-num{font-size:2rem;}
.score-circle .sc-den{font-size:0.8rem;color:var(--text2);font-weight:400;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0.65rem 1.4rem;border-radius:8px;font-family:inherit;font-size:0.93rem;font-weight:500;cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.98);}
.btn.primary{background:var(--teal);color:var(--navy);}
.btn.primary:hover{opacity:0.88;}
.btn.danger-btn{background:var(--accent);color:#fff;}
.btn.danger-btn:hover{opacity:0.88;}
.btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--card-border);}
.btn.ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:0.75rem;margin-top:1.6rem;flex-wrap:wrap;}
.divider{border:none;border-top:1px solid var(--card-border);margin:1.3rem 0;}
.text-sm{font-size:0.85rem;color:var(--text2);line-height:1.6;}
.mb1{margin-bottom:0.5rem;}.mb2{margin-bottom:1rem;}.mt1{margin-top:0.5rem;}.mt2{margin-top:1rem;}
input[type=text],input[type=email]{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);border-radius:8px;padding:0.65rem 0.9rem;color:var(--text);font-family:inherit;font-size:0.93rem;margin-bottom:0.75rem;transition:border-color 0.2s;}
input[type=text]:focus,input[type=email]:focus{outline:none;border-color:rgba(46,196,182,0.5);}
input::placeholder{color:var(--text3);}
label.field-label{display:block;font-size:0.8rem;color:var(--text3);margin-bottom:4px;font-weight:500;letter-spacing:0.03em;}
.attempts-left{font-size:0.82rem;padding:6px 12px;border-radius:6px;display:inline-block;margin-bottom:1rem;}
.attempts-left.ok{background:rgba(46,196,182,0.1);color:var(--teal);}
.attempts-left.low{background:rgba(244,162,97,0.1);color:var(--warn);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:520px){h1.display{font-size:1.9rem;}.icon-row{gap:0.6rem;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const CONFIG = {
  emailjs_public_key:  'TimLHQAe1GrCAODHI',
  emailjs_service_id:  'service_6ytku3x',
  emailjs_template_id: 'template_y3vut2b',
  admin_email:         'zallen@bobjohnsonauto.com',
  pass_score:          5,
  max_attempts:        3
};
// ─────────────────────────────────────────────────────────────────

const MODULES = ['intro','user-info','spot','browsing','examples','clicked','incident','quiz','done'];
const MODULE_LABELS = ['Intro','Your Info','Spot Phishing','Safe Browsing','Email Examples','If You Clicked','Incident Response','Quiz','Complete'];
const CONTENT_MODULES = ['spot','browsing','examples','clicked','incident'];

const QUIZ = [
  {
    q:"You receive an email from 'support@paypa1.com' asking you to verify your account. What should you do?",
    options:["Click the link and log in to check your account","Forward it to IT and delete it without clicking anything","Reply to the email asking if it's legitimate","Ignore it and do nothing"],
    correct:1,
    explain:{1:"Correct. Forwarding to IT lets the security team investigate and protect the whole organization. Never click links in suspicious emails.",0:"The domain 'paypa1.com' uses the number 1 instead of the letter l — a classic spoofing trick.",2:"Replying confirms your address is active to the attacker. Always report to IT instead.",3:"Ignoring it means IT can't investigate. Always report suspicious emails."}
  },
  {
    q:"You hover over a link in an email and the status bar shows: http://microsoft.com.login.verify-now.ru/account — is this link safe?",
    options:["Yes — it contains 'microsoft.com' so it's legitimate","No — the actual domain is 'verify-now.ru', not microsoft.com","Only if the email looks official","It depends on whether your antivirus flags it"],
    correct:1,
    explain:{1:"Correct. The real domain is the part just before the first single slash. Here it's 'verify-now.ru' — a Russian domain. 'microsoft.com' is just a subdomain prefix used to deceive.",0:"This is a common trick. Attackers put a trusted name before their actual malicious domain.",2:"Visual appearance of an email is easy to fake and doesn't validate links.",3:"Antivirus is a last line of defense — your judgment is the first."}
  },
  {
    q:"You accidentally entered your credentials on a suspicious page. What's your first priority?",
    options:["Wait and see if anything unusual happens","Tell a coworker","Immediately change your password and notify IT","Log out of all accounts"],
    correct:2,
    explain:{2:"Correct. Speed matters. Change your password immediately, then notify IT so they can check for unauthorized access.",0:"Waiting gives attackers time to use your credentials.",1:"Telling a coworker isn't enough — IT needs to know to respond.",3:"Logging out alone doesn't help if the attacker already has your password."}
  },
  {
    q:"Which action best follows your organization's incident response procedure when you spot a suspicious email?",
    options:["Delete it immediately so it can't spread","Forward it to IT/security and avoid clicking anything","Post about it in the company chat to warn others","Reply to ask the sender if it's real"],
    correct:1,
    explain:{1:"Correct. Forwarding to IT preserves the evidence and lets security investigate scope — then delete it after reporting.",0:"Deleting before reporting destroys evidence IT needs to investigate.",2:"Posting in chat can cause panic and doesn't give IT the information they need.",3:"Replying reaches the attacker and confirms your address is active."}
  },
  {
    q:"A legitimate-looking email asks you to 'confirm your password' to keep your account active. This is:",
    options:["Normal — IT sometimes needs to verify accounts","Fine if the email looks professional","Always a phishing attempt — no legitimate company asks for your password via email","Okay to respond if you trust the sender name"],
    correct:2,
    explain:{2:"Correct. Legitimate organizations will never ask for your password via email. This is always a phishing indicator.",0:"IT has tools to manage accounts without needing your password. This is never legitimate.",1:"Professional appearance is easy to fake. Content matters more than visuals.",3:"Even if you recognize the name, the account could be compromised."}
  }
];

let state = {
  screen:'intro',
  userName:'',
  userEmail:'',
  quizIdx:0,
  answers:[],
  selected:null,
  confirmed:false,
  quizAttempt:0,
  passed:false,
  submitting:false,
  submitted:false,
  submitError:''
};

const MODULES_LIST = MODULES;

function setState(p){Object.assign(state,p);render();}

function progress(){
  const idx = MODULES_LIST.indexOf(state.screen);
  return Math.round((idx/(MODULES_LIST.length-1))*100);
}

function render(){
  const app = document.getElementById('app');
  const idx = MODULES_LIST.indexOf(state.screen);
  const pct = progress();

  const dotHtml = CONTENT_MODULES.map((m,i)=>{
    const mIdx = MODULES_LIST.indexOf(m);
    let cls = 'module-dot';
    if(mIdx < idx) cls += ' done';
    else if(mIdx === idx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let html = `<div class="progress-wrap">
    <div class="progress-label"><span>${MODULE_LABELS[idx] || ''}</span><span>${pct}%</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="module-dots">${dotHtml}</div>
  </div><div class="screen">`;

  if(state.screen==='intro') html+=renderIntro();
  else if(state.screen==='user-info') html+=renderUserInfo();
  else if(state.screen==='spot') html+=renderSpot();
  else if(state.screen==='browsing') html+=renderBrowsing();
  else if(state.screen==='examples') html+=renderExamples();
  else if(state.screen==='clicked') html+=renderClicked();
  else if(state.screen==='incident') html+=renderIncident();
  else if(state.screen==='quiz') html+=renderQuiz();
  else if(state.screen==='done') html+=renderDone();
  html+=`</div>`;
  app.innerHTML = html;
}

function renderIntro(){
  return `<span class="tag module">Security Awareness Training</span>
  <h1 class="display">Don't take the bait.</h1>
  <p class="subtitle">This training covers everything you need to recognize, avoid, and respond to phishing attacks. Complete all 5 modules and pass the quiz to receive your completion certificate.</p>
  <div class="icon-row">
    <div class="icon-card"><div class="ico">🎣</div><div class="ico-label">Spot phishing</div></div>
    <div class="icon-card"><div class="ico">🔗</div><div class="ico-label">Safe browsing</div></div>
    <div class="icon-card"><div class="ico">📧</div><div class="ico-label">Real vs. fake</div></div>
    <div class="icon-card"><div class="ico">🚨</div><div class="ico-label">If you click</div></div>
    <div class="icon-card"><div class="ico">📋</div><div class="ico-label">Incident response</div></div>
  </div>
  <div class="card warn-card mb2">
    <p class="text-sm"><strong style="color:var(--warn)">Quiz requirement</strong><br/>You must score 5 out of 5 to pass. You have up to ${CONFIG.max_attempts} attempts. Take your time reading each module before starting.</p>
  </div>
  <p class="text-sm">Estimated time: <strong style="color:var(--text)">10–15 minutes</strong></p>
  <div class="btn-row"><button class="btn primary" onclick="go('user-info')">Get Started →</button></div>`;
}

function renderUserInfo(){
  return `<span class="tag module">Before We Begin</span>
  <h2 class="section-title">Enter your information</h2>
  <p class="subtitle">This is used to generate your completion record and send a confirmation to your IT team.</p>
  <label class="field-label">Full Name</label>
  <input type="text" id="inp-name" placeholder="Jane Smith" value="${state.userName}"/>
  <label class="field-label">Work Email Address</label>
  <input type="email" id="inp-email" placeholder="jane.smith@company.com" value="${state.userEmail}"/>
  <div id="info-error" style="color:var(--accent);font-size:0.83rem;min-height:1.2rem;margin-bottom:0.5rem;"></div>
  <div class="btn-row">
    <button class="btn ghost" onclick="go('intro')">← Back</button>
    <button class="btn primary" onclick="submitUserInfo()">Continue →</button>
  </div>`;
}

function submitUserInfo(){
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const err = document.getElementById('info-error');
  if(!name){err.textContent='Please enter your full name.';return;}
  if(!email||!email.includes('@')){err.textContent='Please enter a valid email address.';return;}
  setState({userName:name,userEmail:email,screen:'spot'});
  window.scrollTo(0,0);
}

function renderSpot(){
  return `<span class="tag module">Module 1 of 5</span>
  <h2 class="section-title">How to spot a phishing email</h2>
  <p class="subtitle">Attackers are sophisticated — but they always leave clues. Here's what to watch for in every email you receive.</p>
  <ul class="list-check">
    <li><span class="dot red">!</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Mismatched or spoofed sender address</strong>The display name may say "Microsoft Support" but the actual email is from a random domain. Always expand the sender field and verify the full address matches the company it claims to be from.</div></li>
    <li><span class="dot red">!</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Urgency and threats</strong>"Your account will be suspended in 24 hours." Attackers manufacture time pressure to override your judgment. Legitimate organizations rarely demand immediate action via email.</div></li>
    <li><span class="dot red">!</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Requests for credentials or sensitive data</strong>No legitimate organization — including your own IT team — will ever ask for your password, SSN, or banking info via email.</div></li>
    <li><span class="dot red">!</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Unexpected attachments</strong>Invoices you weren't expecting, "shared documents" from unknown senders, ZIP files — these are common malware delivery mechanisms. Don't open attachments you weren't expecting.</div></li>
    <li><span class="dot red">!</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Generic greetings</strong>"Dear Customer" or "Dear Employee" instead of your actual name can indicate a mass phishing campaign not tailored to you specifically.</div></li>
    <li><span class="dot amber">?</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Unusual requests from known contacts</strong>If a coworker or vendor emails asking for something out of character — gift cards, wire transfers, urgent credential resets — call them directly to verify before acting.</div></li>
    <li><span class="dot teal">✓</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">When in doubt, don't click</strong>Trust your instincts. Forward to IT and let them investigate. It takes 30 seconds and could protect the entire organization.</div></li>
  </ul>
  <div class="btn-row">
    <button class="btn ghost" onclick="go('user-info')">← Back</button>
    <button class="btn primary" onclick="go('browsing')">Next: Safe Browsing →</button>
  </div>`;
}

function renderBrowsing(){
  return `<span class="tag info">Module 2 of 5</span>
  <h2 class="section-title">Safe browsing & link inspection</h2>
  <p class="subtitle">Before you click any link — in an email, a text, or a website — take five seconds to inspect it. Here's how.</p>

  <strong style="color:var(--text);display:block;margin-bottom:8px;font-size:0.95rem;">How to read a URL</strong>
  <p class="text-sm mb2">The real domain is always the segment immediately before the first single forward slash. Everything before it can be faked.</p>

  <div class="url-demo">
    <span class="url-neutral">http://</span><span class="url-bad">microsoft.com</span><span class="url-neutral">.login.</span><span class="url-bad">verify-now.ru</span><span class="url-neutral">/account/reset</span>
    <div style="margin-top:6px;font-size:0.78rem;color:var(--accent)">⚑ Real domain: verify-now.ru — .ru is Russia. "microsoft.com" here is just a subdomain trick.</div>
  </div>

  <div class="url-demo">
    <span class="url-neutral">https://</span><span class="url-good">microsoft.com</span><span class="url-neutral">/en-us/account/reset?token=abc123</span>
    <div style="margin-top:6px;font-size:0.78rem;color:var(--success)">✓ Real domain: microsoft.com — everything after the first slash is just a path on Microsoft's own server.</div>
  </div>

  <hr class="divider"/>
  <strong style="color:var(--text);display:block;margin-bottom:10px;font-size:0.95rem;">Practical habits</strong>
  <div class="two-col">
    <div class="tip-card"><div class="tip-icon">🖱️</div><strong>Hover before you click</strong><span>In desktop email clients and browsers, hovering over a link shows the real destination in the status bar. Never click without checking.</span></div>
    <div class="tip-card"><div class="tip-icon">🔒</div><strong>Check for HTTPS</strong><span>HTTPS means the connection is encrypted — but it does NOT mean the site is safe. Phishing sites can have HTTPS too. Check the domain first.</span></div>
    <div class="tip-card"><div class="tip-icon">🏠</div><strong>Navigate directly</strong><span>Instead of clicking email links, open your browser and type the real address directly (e.g. microsoft.com). This bypasses fake links entirely.</span></div>
    <div class="tip-card"><div class="tip-icon">📋</div><strong>Copy, don't click</strong><span>If you need to inspect a link, right-click and copy the URL, then paste it into a text editor to read the real destination before visiting.</span></div>
    <div class="tip-card"><div class="tip-icon">📱</div><strong>Be extra cautious on mobile</strong><span>Mobile browsers often hide full URLs. Long-press links to preview the destination before tapping. Phishing on mobile is harder to spot.</span></div>
    <div class="tip-card"><div class="tip-icon">🔍</div><strong>Use link scanners</strong><span>When in doubt, paste a suspicious URL into VirusTotal.com or Google Safe Browsing to check if it's been flagged as malicious.</span></div>
  </div>

  <div class="card highlight">
    <p class="text-sm"><strong style="color:var(--teal);display:block;margin-bottom:4px">Remember</strong>A link can look completely legitimate and still take you somewhere dangerous. The five seconds you spend inspecting a link is always worth it.</p>
  </div>

  <div class="btn-row">
    <button class="btn ghost" onclick="go('spot')">← Back</button>
    <button class="btn primary" onclick="go('examples')">Next: Email Examples →</button>
  </div>`;
}

  <div class="step-row"><div class="step-num">2</div><div class="step-text"><strong>Change your password right now</strong><span>If you entered credentials, change that password immediately — and any other accounts where you reuse that password. Prioritize your work account first.</span></div></div>

  <div class="step-row"><div class="step-num">6</div><div class="step-text"><strong>Watch for follow-up attacks</strong><span>After a successful phish, attackers often follow up with targeted emails impersonating IT or your bank. Be extra vigilant for the days following any incident.</span></div></div>

  <ul class="list-check mb2">

    <li><span class="dot blue">2</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Report — don't remediate</strong>You are not expected to fix security incidents yourself. Report to IT immediately with as much detail as possible: the email, the link, the time, what you submitted. Let the security team take it from there.</div></li>
    <li><span class="dot blue">3</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Preserve evidence</strong>Do not delete the suspicious email before reporting. IT needs it to investigate scope — who else received it, what infrastructure it uses, and whether others may be at risk.</div></li>
    <li><span class="dot blue">4</span><div><strong style="color:var(--text);display:block;margin-bottom:2px">Cooperate with IT</strong>IT may need access to your machine, your email history, or ask you to change passwords. This is normal incident response — cooperate promptly to speed up containment.</div></li>

    <div class="tip-card"><div class="tip-icon">🎫</div><strong>Submit a ticket</strong><span>Open a support ticket tagged "Phishing/Suspicious Email" with the email subject, sender address, time received, and any actions you took. A screenshot can be attached if needed.</span></div>

function startQuiz(){
  setState({screen:'quiz',quizIdx:0,answers:[],selected:null,confirmed:false});
  window.scrollTo(0,0);
}

function renderQuiz(){
  const attempt = state.quizAttempt;
  const attemptsLeft = CONFIG.max_attempts - attempt;
  const q = QUIZ[state.quizIdx];
  const sel = state.selected;
  const conf = state.confirmed;
  const isLast = state.quizIdx === QUIZ.length - 1;

  let attBadge = '';
  if(attempt > 0){
    const cls = attemptsLeft <= 1 ? 'low' : 'ok';
    attBadge = `<div class="attempts-left ${cls}">Attempt ${attempt+1} of ${CONFIG.max_attempts} — ${attemptsLeft} attempt${attemptsLeft!==1?'s':''} remaining after this</div>`;
  }

  let opts = q.options.map((o,i)=>{
    let cls='quiz-option';
    if(conf){if(i===q.correct)cls+=' correct';else if(i===sel&&i!==q.correct)cls+=' incorrect';}
    return `<button class="${cls}"${conf?' disabled':''} onclick="selectOpt(${i})">${o}</button>`;
  }).join('');

  let explain = '';
  if(conf && sel !== null){
    const right = sel === q.correct;
    explain = `<div class="quiz-explain ${right?'good':'bad'}">${right?'✓ Correct. ':'✗ Not quite. '}${q.explain[sel]}</div>`;
  }

  let nav = '';
  if(!conf && sel!==null){
    nav = `<button class="btn primary" onclick="confirmOpt()">Confirm Answer</button>`;
  } else if(conf){
    if(!isLast) nav = `<button class="btn primary" onclick="nextQ()">Next Question →</button>`;
    else nav = `<button class="btn primary" onclick="finishQuiz()">See My Results →</button>`;
  }

  return `<span class="tag module">Knowledge Check</span>
  <h2 class="section-title mb2">Test your understanding</h2>
  ${attBadge}
  <p class="q-counter">Question ${state.quizIdx+1} of ${QUIZ.length} — you must score ${CONFIG.pass_score}/${QUIZ.length} to pass</p>
  <p class="q-text">${q.q}</p>
  ${opts}
  ${explain}
  <div id="quiz-nav" class="btn-row">${nav}</div>`;
}

function renderDone(){
  const correct = state.answers.filter((a,i)=>a===QUIZ[i].correct).length;
  const passed = correct >= CONFIG.pass_score;
  const attemptsLeft = CONFIG.max_attempts - (state.quizAttempt+1);
  const color = passed ? 'var(--success)' : 'var(--accent)';

  let body = '';
  if(passed){
    body = `
    <div class="pass-fail-badge pass">✓ PASSED</div>
    <p class="subtitle" style="text-align:center">Excellent — you've demonstrated a strong understanding of phishing threats and response procedures.</p>
    <div class="card highlight mb2">
      <p class="text-sm"><strong style="color:var(--teal);display:block;margin-bottom:4px">Key takeaways</strong>
      Verify sender addresses. Inspect links before clicking. Navigate directly instead of clicking email links. Report anything suspicious to <strong>it_servicedesk@bobjohnsonauto.com</strong>. If you click something, change your password and notify IT immediately.</p>
    </div>
    ${state.submitted
      ? `<div class="card" style="border-color:rgba(46,196,90,0.3);background:rgba(46,196,90,0.06)"><p class="text-sm" style="color:var(--success)">✓ Completion confirmation sent to your IT team.</p></div>`
      : `<div id="submit-area">
          ${state.submitError ? `<div style="color:var(--accent);font-size:0.83rem;margin-bottom:0.5rem">${state.submitError}</div>` : ''}
          <button class="btn primary" id="submit-btn" onclick="sendConfirmation()" ${state.submitting?'disabled':''}>
            ${state.submitting?'<span class="spinner"></span>Sending...':'Submit Completion Record'}
          </button>
         </div>`
    }`;
  } else {
    const canRetry = attemptsLeft > 0;
    body = `
    <div class="pass-fail-badge fail">✗ NOT PASSED</div>
    <p class="subtitle" style="text-align:center">You scored ${correct} out of ${QUIZ.length}. You need all 5 correct to pass. Review the modules and try again.</p>
    <div class="card warn-card mb2">
      <p class="text-sm"><strong style="color:var(--warn)">Review tip</strong><br/>Go back through the modules and pay close attention to the URL inspection section and incident response procedures — these are common sticking points.</p>
    </div>
    ${canRetry
      ? `<div class="btn-row">
           <button class="btn ghost" onclick="go('spot')">← Review Modules</button>
           <button class="btn danger-btn" onclick="retryQuiz()">Retry Quiz (${attemptsLeft} attempt${attemptsLeft!==1?'s':''} left)</button>
         </div>`
      : `<div class="card danger-card"><p class="text-sm"><strong style="color:var(--accent)">Maximum attempts reached</strong><br/>Please contact your IT team at <strong>it_servicedesk@bobjohnsonauto.com</strong> to discuss next steps.</p></div>`
    }`;
  }

  return `<span class="tag ${passed?'success':'danger'}">Training ${passed?'Complete':'Incomplete'}</span>
  <h2 class="section-title mb2">${passed?'Training complete!':'Quiz not passed'}</h2>
  <div class="score-circle" style="background:${color}22;border:3px solid ${color}">
    <span class="sc-num" style="color:${color}">${correct}</span>
    <span class="sc-den">out of ${QUIZ.length}</span>
  </div>
  ${body}`;
}

function go(screen){setState({screen});window.scrollTo(0,0);}

function selectOpt(i){
  if(state.confirmed) return;
  state.selected = i;
  document.querySelectorAll('.quiz-option').forEach((btn,idx)=>{
    btn.classList.toggle('selected-opt', idx===i);
  });
  const nav = document.getElementById('quiz-nav');
  if(nav) nav.innerHTML = '<button class="btn primary" onclick="confirmOpt()">Confirm Answer</button>';
}

function confirmOpt(){
  if(state.selected===null) return;
  setState({confirmed:true});
}

function nextQ(){
  setState({quizIdx:state.quizIdx+1,answers:[...state.answers,state.selected],selected:null,confirmed:false});
  window.scrollTo(0,0);
}

function finishQuiz(){
  const newAnswers = [...state.answers, state.selected];
  const correct = newAnswers.filter((a,i)=>a===QUIZ[i].correct).length;
  const passed = correct >= CONFIG.pass_score;
  setState({screen:'done',answers:newAnswers,passed,quizAttempt:state.quizAttempt+1,selected:null,confirmed:false});
  window.scrollTo(0,0);
}

function retryQuiz(){
  setState({screen:'quiz',quizIdx:0,answers:[],selected:null,confirmed:false});
  window.scrollTo(0,0);
}

async function sendConfirmation(){
  setState({submitting:true,submitError:''});
  const correct = state.answers.filter((a,i)=>a===QUIZ[i].correct).length;
  const now = new Date().toLocaleString('en-US',{dateStyle:'long',timeStyle:'short'});

  try {
    emailjs.init(CONFIG.emailjs_public_key);
    await emailjs.send(CONFIG.emailjs_service_id, CONFIG.emailjs_template_id, {
      to_email:    CONFIG.admin_email,
      user_name:   state.userName,
      user_email:  state.userEmail,
      score:       `${correct} / ${QUIZ.length}`,
      result:      correct >= CONFIG.pass_score ? 'PASSED' : 'FAILED',
      attempt:     state.quizAttempt,
      completed_at: now
    });
    setState({submitting:false,submitted:true});
  } catch(err){
    setState({submitting:false,submitError:'Failed to send — please contact IT directly at it_servicedesk@bobjohnsonauto.com or submit a help ticket.'});
  }
}

render();
</script>
